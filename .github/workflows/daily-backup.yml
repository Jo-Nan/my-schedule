name: Daily Backup of Multi-User Data

on:
  schedule:
    # Run every day at 4:00 AM Beijing time (UTC+8) = 20:00 previous day UTC
    - cron: '0 20 * * *'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create backups directory
        run: mkdir -p backups

      - name: Verify day-data access
        env:
          BACKUP_API_TOKEN: ${{ secrets.DAY_DATA_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$BACKUP_API_TOKEN" ]; then
            echo "::error::No token available for backup reads. Set DAY_DATA_TOKEN or ensure GITHUB_TOKEN is available."
            exit 1
          fi

          STATUS=$(curl -sS -o /tmp/day-data-probe.json -w "%{http_code}" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $BACKUP_API_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/Jo-Nan/day-data/contents/data/users.json?ref=main")

          if [ "$STATUS" -ge 400 ]; then
            echo "::error::Cannot read Jo-Nan/day-data/data/users.json (HTTP $STATUS). Check DAY_DATA_TOKEN repository scope, Contents permission, and SSO authorization."
            cat /tmp/day-data-probe.json
            exit 1
          fi

          echo "day-data access check passed."

      - name: Run backup script
        env:
          # Prefer a dedicated PAT for cross-repo reads; fall back to workflow token.
          GITHUB_TOKEN: ${{ secrets.DAY_DATA_TOKEN || secrets.GITHUB_TOKEN }}
          GITHUB_OWNER: Jo-Nan
          GITHUB_REPO: day-data
          GITHUB_BRANCH: main
          GITHUB_USERS_PATH: data/users.json
          GITHUB_USER_PLANS_PATH: data/plans-by-user.json
          GITHUB_SNAPSHOTS_PATH: data/plan-snapshots.json
          GITHUB_MESSAGES_PATH: data/messages.json
          GITHUB_PLANS_PATH: data/plans.json
        run: node backup-daily.js

      - name: Commit and push backup
        run: |
          git config --global user.name "backup-bot"
          git config --global user.email "backup-bot@github-actions"
          git add backups/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "backup: daily multi-user data snapshot (${{ github.run_id }})"
            git push
          fi
